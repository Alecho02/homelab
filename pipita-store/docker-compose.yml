services:
  app:
    image: evershop/evershop:latest
    depends_on:
      - database
    environment:
      DB_HOST: database
      DB_PORT: "5432"
      DB_NAME: ${PIPITA_DB_NAME}
      DB_USER: ${PIPITA_DB_USER}
      DB_PASSWORD: ${PIPITA_DB_PASSWORD}
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./config:/app/config
      - ./media:/app/media
      - ./translations:/app/translations
    command:
      - sh
      - -lc
      - 'sed -i "s/? ''en'' : language/? language : language/g" /app/node_modules/@evershop/evershop/dist/lib/response/render.js && npm start'
    restart: unless-stopped

  public-proxy:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "192.168.10.118:3002:80"
    volumes:
      - ./nginx/public.conf:/etc/nginx/conf.d/default.conf:ro
      - ./assets:/usr/share/nginx/html/assets:ro
      - ./media:/usr/share/nginx/html/media:ro
    restart: unless-stopped

  database:
    image: postgres:16
    environment:
      POSTGRES_DB: ${PIPITA_DB_NAME}
      POSTGRES_USER: ${PIPITA_DB_USER}
      POSTGRES_PASSWORD: ${PIPITA_DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
