apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  bookmarks.yaml: |
    - Infra:
        - GitHub Homelab:
            - href: https://github.com/Alecho02/homelab
    - Acceso local:
        - Traefik LB:
            - href: http://192.168.10.118
        - Nodo worker:
            - href: http://192.168.10.184
  services.yaml: |
    - Observabilidad:
        - Grafana:
            href: http://192.168.10.118:32000
            description: Dashboards y métricas
        - Prometheus:
            href: http://192.168.10.118:32090
            description: Consultas y targets
        - Alertmanager:
            href: http://192.168.10.118:32080
            description: Alertas (endpoint del servicio)
    - Cluster:
        - Homepage:
            href: http://home.192.168.10.118.nip.io
            description: Portal principal del homelab
  widgets.yaml: |
    - datetime:
        text_size: xl
        format:
          dateStyle: long
          timeStyle: short
  settings.yaml: |
    title: Homelab
    theme: dark
    color: slate
