apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      nodeSelector:
        kubernetes.io/hostname: raspberry-pi
      initContainers:
        - name: init-config
          image: busybox:1.36
          command: ["sh", "-c", "cp /config-src/* /config/ && mkdir -p /config/logs"]
          volumeMounts:
            - name: config-src
              mountPath: /config-src
            - name: config
              mountPath: /config
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:v0.10.9
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: home.192.168.10.118.nip.io
            - name: HOMEPAGE_VAR_PIHOLE_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-pihole-widget
                  key: PIHOLE_API_KEY
          volumeMounts:
            - name: config
              mountPath: /app/config
      volumes:
        - name: config-src
          configMap:
            name: homepage-config
        - name: config
          emptyDir: {}
