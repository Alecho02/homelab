apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: homepage
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: "3.*"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: homepage
  values:
    controllers:
      main:
        containers:
          app:
            image:
              repository: ghcr.io/gethomepage/homepage
              tag: v0.10.9
            env:
              HOMEPAGE_ALLOWED_HOSTS: home.local
    service:
      main:
        controller: main
        ports:
          http:
            port: 3000
    ingress:
      main:
        enabled: true
        className: nginx
        hosts:
          - host: home.local
            paths:
              - path: /
                pathType: Prefix
    persistence:
      config:
        enabled: true
        type: configMap
        name: homepage-config
        globalMounts:
          - path: /app/config
    configMaps:
      config:
        enabled: true
        data:
          bookmarks.yaml: |
            - Infra:
                - GitHub Homelab:
                    - href: https://github.com/Alecho02/homelab
          services.yaml: |
            - Cluster:
                - Kubernetes Dashboard:
                    href: https://k8s.local
                    description: UI del cluster
                - Grafana:
                    href: https://grafana.local
                    description: Observabilidad
          widgets.yaml: |
            - datetime:
                text_size: xl
                format:
                  dateStyle: long
                  timeStyle: short
          settings.yaml: |
            title: Homelab
            theme: dark
            color: slate
