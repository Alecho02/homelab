apiVersion: v1
kind: Namespace
metadata:
  name: dev
---
apiVersion: v1
kind: Secret
metadata:
  name: java17-vault-service-secret
  namespace: dev
type: Opaque
stringData:
  APP_SECRET: "replace-from-pipeline"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: java17-vault-service
  namespace: dev
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: java17-vault-service
  template:
    metadata:
      labels:
        app: java17-vault-service
    spec:
      imagePullSecrets:
      - name: ghcr-pull-secret
      containers:
      - name: app
        image: ghcr.io/alecho02/java17-vault-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: APP_SECRET
          valueFrom:
            secretKeyRef:
              name: java17-vault-service-secret
              key: APP_SECRET
        - name: APP_CONFIG_VALUE
          value: "config-local-dev"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: java17-vault-service
  namespace: dev
spec:
  selector:
    app: java17-vault-service
  ports:
  - name: http
    port: 80
    targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: java17-vault-service-hpa
  namespace: dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: java17-vault-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70
