apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: java17-vault-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:Alecho02/homelab.git
    targetRevision: main
    path: training/java17-vault-service/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
